<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - نظام التيكتات</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a25;
    --border: #2a2a3a; --accent: #5865f2; --accent2: #7289da;
    --text: #e8e8f0; --text2: #8888aa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px; opacity: 0.3;
  }
  .glow {
    position: fixed; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(88,101,242,0.15) 0%, transparent 70%);
    top: -100px; left: 50%; transform: translateX(-50%); z-index: 0;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .container {
    position: relative; z-index: 1; text-align: center;
    padding: 60px 40px;
    background: rgba(17,17,24,0.85);
    border: 1px solid var(--border); border-radius: 24px;
    backdrop-filter: blur(20px); max-width: 480px; width: 90%;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto 24px;
    box-shadow: 0 0 40px rgba(88,101,242,0.4);
  }
  h1 {
    font-size: 28px; font-weight: 700; margin-bottom: 8px;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  p { color: var(--text2); margin-bottom: 40px; line-height: 1.7; font-size: 15px; }
  .badge {
    display: inline-block;
    background: rgba(88,101,242,0.15); border: 1px solid rgba(88,101,242,0.3);
    color: var(--accent2); padding: 4px 14px; border-radius: 20px;
    font-size: 12px; margin-bottom: 20px; letter-spacing: 0.5px;
  }
  .btn-discord {
    display: inline-flex; align-items: center; gap: 12px;
    background: var(--accent); color: white; text-decoration: none;
    padding: 16px 36px; border-radius: 14px;
    font-size: 16px; font-weight: 600; font-family: inherit;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(88,101,242,0.4);
  }
  .btn-discord:hover {
    background: var(--accent2); transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(88,101,242,0.5);
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="container">
  <div class="logo">🎫</div>
  <div class="badge">لوحة تحكم النظام</div>
  <h1>نظام التيكتات</h1>
  <p>سجّل دخولك عبر Discord للوصول إلى لوحة التحكم وإدارة إعدادات التيكتات بالكامل</p>
  <a href="/auth/discord" class="btn-discord">
    <svg width="20" height="20" viewBox="0 0 71 55" fill="white">
      <path d="M60.1 4.9A58.6 58.6 0 0 0 45.5.3a40.5 40.5 0 0 0-1.8 3.7 54.2 54.2 0 0 0-16.4 0A38.9 38.9 0 0 0 25.5.3 58.5 58.5 0 0 0 10.9 4.9C1.6 18.7-1 32.2.3 45.5a59 59 0 0 0 18 9.1 44.4 44.4 0 0 0 3.8-6.2 38.4 38.4 0 0 1-6-2.9l1.5-1.1a42 42 0 0 0 36.1 0l1.5 1.1a38.4 38.4 0 0 1-6 2.9 44.4 44.4 0 0 0 3.8 6.2 58.8 58.8 0 0 0 18-9.1C72.6 30 69.2 16.6 60.1 4.9ZM23.7 37.3c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.5 3.2 6.4 7.2 0 4-2.9 7.2-6.4 7.2Zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.5 3.2 6.4 7.2 0 4-2.9 7.2-6.4 7.2Z"/>
    </svg>
    تسجيل الدخول بـ Discord
  </a>
</div>
</body>
</html>
